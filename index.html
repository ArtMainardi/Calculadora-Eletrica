<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="page" id="resistor-modal" style="display: none;">
        <div class="calculator-container">
            <div class="main-container">
                <h1 class="title">CALCULADORA DE RESISTOR!</h1>
                <div class="selectors-container">
                    <select class="quantidade-faixas" id="faixas">
                        <option value="">Quantidade de Faixas do Resistor!</option>
                        <option value="4">4 faixas</option>
                        <option value="5">5 faixas</option>
                    </select>
                </div>
                <div class="color-bands-selectors">
                    <h1 class="sub-title">CORES DAS FAIXAS:</h1>
                    <div class="selectors-container">
                        <select class="cor" id="cor1">
                            <option value="">Selecione a cor da faixa</option>
                            <option value="0">Preto</option>
                            <option value="1">Marrom</option>
                            <option value="2">Vermelho</option>
                            <option value="3">Laranja</option>
                            <option value="4">Amarelo</option>
                            <option value="5">Verde</option>
                            <option value="6">Azul</option>
                            <option value="7">Violeta</option>
                            <option value="8">Cinza</option>
                            <option value="9">Branco</option>
                        </select>
                    </div>
                    <div class="selectors-container">
                        <select class="cor" id="cor2">
                            <option value="">Selecione a cor da faixa</option>
                            <option value="0">Preto</option>
                            <option value="1">Marrom</option>
                            <option value="2">Vermelho</option>
                            <option value="3">Laranja</option>
                            <option value="4">Amarelo</option>
                            <option value="5">Verde</option>
                            <option value="6">Azul</option>
                            <option value="7">Violeta</option>
                            <option value="8">Cinza</option>
                            <option value="9">Branco</option>
                        </select>
                    </div>
                    <div class="selectors-container" id="seletor-cores-3" style="display: none;">
                        <select class="cor" id="cor3">
                            <option value="">Selecione a cor da faixa</option>
                            <option value="0">Preto</option>
                            <option value="1">Marrom</option>
                            <option value="2">Vermelho</option>
                            <option value="3">Laranja</option>
                            <option value="4">Amarelo</option>
                            <option value="5">Verde</option>
                            <option value="6">Azul</option>
                            <option value="7">Violeta</option>
                            <option value="8">Cinza</option>
                            <option value="9">Branco</option>
                        </select>
                    </div>
                    <div class="selectors-container">
                        <select class="cor" id="cor4">
                            <option value="">Selecione a cor da faixa</option>
                            <option value=1>Preto</option>
                            <option value=10>Marrom</option>
                            <option value=100>Vermelho</option>
                            <option value=1000>Laranja</option>
                            <option value=10000>Amarelo</option>
                            <option value=100000>Verde</option>
                            <option value=1000000>Azul</option>
                            <option value=10000000>Violeta</option>
                            <option value=0.1>Dourado</option>
                            <option value=0.01>Prateado</option>
                        </select>
                    </div>
                    <div class="selectors-container selector5">
                        <select class="cor" id="cor5">
                            <option value="">Selecione a cor da faixa</option>
                            <option value="±1%">Marrom</option>
                            <option value="±2%">Vermelho</option>
                            <option value="±0,5%">Verde</option>
                            <option value="±0,25%">Azul</option>
                            <option value="±0,1%">Violeta</option>
                            <option value="±0,05%">Cinza</option>
                            <option value="±5%">Dourado</option>
                            <option value="±10%">Prateado</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="result-container">
                <span class="text" id="result-text"></span>
                <span class="text"></span>
            </div>
        </div>
        <div class="resistor-container">
            <div class="resistor">
                <div class="pino"></div>
                <div class="retangulo">
                    <div class="faixa" id="f2"></div>
                    <div class="faixa" id="f3" style="display: none;"></div>
                    <div class="faixa" id="f4"></div>
                </div>
                <div class="quadrado q1">
                    <div class="faixa" id="f1"></div>
                </div>
                <div class="quadrado q2">
                    <div class="faixa" id="f5"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Calculadora de Consumo: -->
    <script src="Calculadora de Consumo/calculoConsumo.js"></script>
    <script src="Calculadora de Consumo/calculoKwh.js"></script>

    <!-- Conversor de Medidas: -->
    <script src="Conversor de Medidas/conversorMedidas.js"></script>
    <script src="Conversor de Medidas/definirIndexInicial.js"></script>
    <script src="Conversor de Medidas/definirIndexFinal.js"></script>

    <!-- Calculadora de Resistor: -->
    <script src="Calculadora Resistor/calculadoraResistor.js"></script>
    <script src="Calculadora Resistor/mudarCorSeletor.js"></script>
    <script src="Calculadora Resistor/onOff5selectors.js"></script>
    <script src="Calculadora Resistor/addListeners.js"></script>
    <script src="script.js"></script>
</body>
</html>
